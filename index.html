<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Tech | Геймърски Конфигурации</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dropdown:hover .dropdown-menu { display: block; }
        .btn-gaming {
            background: linear-gradient(90deg, #8b5cf6, #3b82f6);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-gaming:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        }
        .modal { transition: opacity 0.25s ease; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

    <nav class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex space-x-7">
                    <a href="#" onclick="showPage('home')" class="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-500">
                        RGB TECH
                    </a>
                    <div class="hidden md:flex items-center space-x-4">
                        <div class="relative dropdown">
                            <button class="py-4 px-2 text-gray-300 font-semibold hover:text-purple-400 transition">Конфигурации ▼</button>
                            <ul class="dropdown-menu absolute hidden text-gray-100 pt-1 bg-gray-800 border border-gray-700 shadow-xl rounded-lg w-48">
                                <li><a class="hover:bg-gray-700 py-2 px-4 block" href="#" onclick="filterCategory('Budget')">Бюджетни (1080p)</a></li>
                                <li><a class="hover:bg-gray-700 py-2 px-4 block" href="#" onclick="filterCategory('High-End')">High-End (4K)</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div id="user-section">
                        <button onclick="toggleModal('login-modal')" class="text-gray-300 hover:text-white font-bold px-4">Вход</button>
                    </div>
                    <button onclick="showPage('cart')" class="py-2 px-4 btn-gaming text-white rounded-full font-bold">
                        🛒 Количка (<span id="cart-count">0</span>)
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-10 px-4 mb-20">
        <div id="home-page">
            <h2 id="category-title" class="text-3xl font-bold border-l-4 border-purple-500 pl-4 mb-8">Всички Машини</h2>
            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </div>

        <div id="cart-page" class="hidden">
            <h2 class="text-3xl font-bold mb-8 text-center">Вашият Арсенал</h2>
            <div id="cart-items" class="bg-gray-800 border border-gray-700 p-6 rounded-2xl mb-4"></div>
            <div class="text-right">
                <p class="text-2xl font-bold mb-4 text-purple-400">Общо: <span id="cart-total">0.00</span> лв.</p>
                <button onclick="showPage('checkout')" class="btn-gaming text-white px-10 py-4 rounded-full font-black uppercase tracking-widest">Към Чекаут</button>
            </div>
        </div>

        <div id="checkout-page" class="hidden">
            <h2 class="text-3xl font-bold mb-8">Завършване на поръчката</h2>
            <div class="bg-gray-800 border border-gray-700 p-8 rounded-2xl max-w-2xl mx-auto">
                <form onsubmit="event.preventDefault(); alert('Поръчката е приета!');">
                    <div class="mb-4">
                        <label class="block text-gray-400 mb-2">Адрес за доставка</label>
                        <input type="text" class="w-full bg-gray-900 border border-gray-600 p-3 rounded" required>
                    </div>
                    <button type="submit" class="w-full btn-gaming py-4 rounded-xl font-bold uppercase">Потвърди</button>
                </form>
            </div>
        </div>
    </main>

    <div id="login-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-75 px-4">
        <div class="bg-gray-800 p-8 rounded-2xl border border-gray-700 w-full max-w-md relative">
            <button onclick="toggleModal('login-modal')" class="absolute top-4 right-4 text-gray-500 hover:text-white">✕</button>
            
            <div id="login-form">
                <h3 class="text-2xl font-bold mb-6 text-center text-purple-400">Влез в акаунта си</h3>
                <input id="login-email" type="email" placeholder="Имейл" class="w-full bg-gray-900 border border-gray-600 p-3 rounded mb-4 focus:border-purple-500 outline-none">
                <input type="password" placeholder="Парола" class="w-full bg-gray-900 border border-gray-600 p-3 rounded mb-6 focus:border-purple-500 outline-none">
                <button onclick="login()" class="w-full btn-gaming py-3 rounded-lg font-bold mb-4">ВХОД</button>
                <p class="text-center text-sm text-gray-400">Нямаш акаунт? <a href="#" onclick="toggleAuthForm()" class="text-blue-400 underline">Регистрирай се</a></p>
            </div>

            <div id="register-form" class="hidden">
                <h3 class="text-2xl font-bold mb-6 text-center text-blue-400">Регистрация</h3>
                <input id="reg-name" type="text" placeholder="Име / Username" class="w-full bg-gray-900 border border-gray-600 p-3 rounded mb-4 focus:border-blue-500 outline-none">
                <input type="email" placeholder="Имейл / Email" class="w-full bg-gray-900 border border-gray-600 p-3 rounded mb-4 focus:border-blue-500 outline-none">
                <input type="password" placeholder="Парола / Password" class="w-full bg-gray-900 border border-gray-600 p-3 rounded mb-6 focus:border-blue-500 outline-none">
                <button onclick="login('reg')" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold mb-4">СЪЗДАЙ АКАУНТ</button>
                <p class="text-center text-sm text-gray-400">Вече имаш акаунт? <a href="#" onclick="toggleAuthForm()" class="text-purple-400 underline">Влез тук</a></p>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Stormbringer v1", spec: "RTX 3060, Ryzen 5", price: 1650, category: "Budget", img: "https://images.unsplash.com/photo-1587202377405-83d97a9d5ec9?w=400" },
            { id: 2, name: "Neon Overlord", spec: "RTX 4080, i9-13900K", price: 4200, category: "High-End", img: "https://images.unsplash.com/photo-1593305841991-05c297ba4575?w=400" },
            { id: 3, name: "Ultimate Beast", spec: "RTX 4090, Liquid Cooled", price: 7800, category: "High-End", img: "https://images.unsplash.com/photo-1552831388-68893ecbb324?w=400" }
        ];

        let cart = [];
        let currentUser = localStorage.getItem('user');

        // Инициализация на потребител
        if (currentUser) updateNavWithUser(currentUser);

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        function toggleAuthForm() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('register-form').classList.toggle('hidden');
        }

        function login(type = 'login') {
            const name = type === 'reg' ? document.getElementById('reg-name').value : "Геймър";
            localStorage.setItem('user', name);
            updateNavWithUser(name);
            toggleModal('login-modal');
        }

        function logout() {
            localStorage.removeItem('user');
            location.reload();
        }

        function updateNavWithUser(name) {
            document.getElementById('user-section').innerHTML = `
                <div class="flex items-center space-x-2">
                    <span class="text-purple-400 font-bold">👋 ${name}</span>
                    <button onclick="logout()" class="text-xs text-red-500 hover:underline">Изход</button>
                </div>
            `;
        }

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map(p => `
                <div class="bg-gray-800 border border-gray-700 p-5 rounded-2xl hover:border-purple-500 transition group">
                    <img src="${p.img}" class="w-full h-48 object-cover rounded-xl mb-4 group-hover:scale-105 transition">
                    <h3 class="text-xl font-bold">${p.name}</h3>
                    <p class="text-gray-400 text-sm mb-4 italic">${p.spec}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-xl font-black">${p.price} лв.</span>
                        <button onclick="addToCart(${p.id})" class="bg-gray-700 hover:bg-purple-600 text-white px-4 py-2 rounded-lg transition">Добави</button>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(cat) {
            renderProducts(products.filter(p => p.category === cat));
            showPage('home');
        }

        function addToCart(id) {
            cart.push(products.find(p => p.id === id));
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const cartItems = document.getElementById('cart-items');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            cartItems.innerHTML = cart.length === 0 ? "Количката е празна." : 
                cart.map(item => `<div class="flex justify-between py-2 border-b border-gray-700"><span>${item.name}</span><b>${item.price} лв.</b></div>`).join('');
            document.getElementById('cart-total').innerText = total.toLocaleString();
        }

        function showPage(pageId) {
            ['home-page', 'cart-page', 'checkout-page'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(pageId + '-page').classList.remove('hidden');
        }

        renderProducts(products);
    </script>
</body>
</html>
